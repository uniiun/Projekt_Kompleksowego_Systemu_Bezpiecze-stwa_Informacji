# Pre-commit hooks dla JustDownIt
repos:
  # Isort - sortowanie importow (przed black)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black, --line-length, "88"]

  # Black - formatowanie kodu
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # Ruff - szybki linter i formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]

# MyPy - type checking (Dostosowany pod Daemona)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi
          - pydantic
          - httpx
          - pytest
          - types-requests
        args: [--ignore-missing-imports]

  # Bandit - security (Zmienione sciezki na core i api)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-ll, -r, app/core/, app/api/]
        exclude: ^tests/

  # Pre-commit hooks - basic checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: ^(bin/|voice_samples/.*\.wav$)
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: debug-statements

# Vulture - martwy kod (Zmienione sciezki)
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [--min-confidence, "80", app/core/, app/api/]

