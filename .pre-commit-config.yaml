# Pre-commit hooks dla kontrola_dostepu_do_zasobow_informacyjnych
repos:
  # Isort - sortowanie importow (przed black)
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black, --line-length, "88"]

  # Black - formatowanie kodu
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  # Ruff - szybki linter i formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff-check
        args: [--fix]

  # MyPy - sprawdzanie typow
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi
          - pydantic
          - httpx
          - pytest
          - types-requests
        args: [--ignore-missing-imports]

  # Bandit - analiza bezpieczenstwa
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-ll]
        exclude: ^(tests/|\.venv/)

  # Pre-commit hooks - podstawowe sprawdzenia
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: debug-statements

  # Vulture - wykrywanie martwego kodu
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [--min-confidence, "80", .]
        exclude: ^\.venv/
